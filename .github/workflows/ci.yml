name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    strategy:
      matrix:
        include:
          - os: macos-14       # arm64
            target: aarch64-apple-darwin
          - os: ubuntu-latest  # x86_64
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace

  python:
    strategy:
      matrix:
        include:
          - os: macos-14
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - run: maturin build --release -m crates/agentc-profiler/Cargo.toml
      - run: pip install target/wheels/*.whl
      - run: pip install -e ".[dev]"
      - run: python -c "from agentc._native import write_span, create_db, query_spans_by_trace; print('native OK:', write_span.__name__)"
      - run: pytest tests/ -v --tb=short

  wheels:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rust, python]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - run: maturin build --release -m crates/agentc-profiler/Cargo.toml --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/*.whl
